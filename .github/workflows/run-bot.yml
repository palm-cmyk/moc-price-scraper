name: Daily MOC Price Scraper

on:
  schedule:
    # ตั้งเวลาทำงาน: 18:00 น. เวลาไทย (11:00 UTC) ทุกวัน จันทร์-ศุกร์
    - cron: '0 11 * * 1-5'
  workflow_dispatch: # ทำให้เรามีปุ่มกดรันบอทเองด้วยมือได้ทันที

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4

    - name: 🐍 Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🔑 Create Firebase Secret Key
      env:
        FIREBASE_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      run: |
        echo "$FIREBASE_JSON" > firebase-key.json

    - name: 🚀 Run Scraper Bot
      run: python scraper.py
