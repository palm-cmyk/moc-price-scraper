name: Daily MOC Price Scraper

on:
  schedule:
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r py/requirements.txt

    - name: Create Firebase Secret Key
      env:
        FIREBASE_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      run: |
        echo "$FIREBASE_JSON" > py/firebase-key.json

    - name: Run Scraper Bot
      id: run_scraper
      run: python py/scraper.py

    - name: Notify LINE on Success
      if: success()
      env:
        LINE_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
      run: |
        TIMESTAMP=$(TZ='Asia/Bangkok' date '+%d/%m/%Y %H:%M')
        curl -s -X POST https://notify-api.line.me/api/notify \
          -H "Authorization: Bearer $LINE_TOKEN" \
          -F "message=COGS Manager scraper success ${TIMESTAMP}"

    - name: Notify LINE on Failure
      if: failure()
      env:
        LINE_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
      run: |
        TIMESTAMP=$(TZ='Asia/Bangkok' date '+%d/%m/%Y %H:%M')
        curl -s -X POST https://notify-api.line.me/api/notify \
          -H "Authorization: Bearer $LINE_TOKEN" \
          -F "message=SCRAPER FAILED ${TIMESTAMP} check GitHub Actions immediately"
