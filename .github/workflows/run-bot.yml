name: Daily MOC Price Scraper

on:
  schedule:
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create Firebase Secret Key
      env:
        FIREBASE_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      run: |
        echo "$FIREBASE_JSON" > firebase-key.json

    - name: Run Scraper Bot
      id: run_scraper
      run: python scraper.py

    - name: Verify Firebase Write
      id: verify_firebase
      env:
        FIREBASE_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      run: |
        python3 - <<'EOF'
        import firebase_admin
        from firebase_admin import credentials, firestore
        from datetime import datetime, timezone
        import sys

        cred = credentials.Certificate('firebase-key.json')
        firebase_admin.initialize_app(cred)
        db = firestore.client()

        doc = db.collection('market_data').document('latest').get()
        if not doc.exists:
            print("FAIL: market_data/latest does not exist")
            sys.exit(1)

        data = doc.to_dict()
        scraped_at = data.get('scraped_at')
        item_count = len(data.get('items', {}))

        if scraped_at is None:
            print(f"WARN: no scraped_at - item count: {item_count}")
            sys.exit(0 if item_count > 100 else 1)

        try:
            scraped_dt = scraped_at.ToDatetime().replace(tzinfo=timezone.utc)
        except Exception:
            scraped_dt = scraped_at

        now_utc = datetime.now(timezone.utc)
        age_hours = (now_utc - scraped_dt).total_seconds() / 3600

        print(f"scraped_at: {scraped_dt.strftime('%Y-%m-%d %H:%M UTC')}")
        print(f"Age: {age_hours:.1f} hours | Items: {item_count}")

        if age_hours > 26:
            print(f"FAIL: stale data ({age_hours:.1f}h old)")
            sys.exit(1)
        if item_count < 100:
            print(f"FAIL: only {item_count} items")
            sys.exit(1)

        print("OK: Firebase data is fresh and complete")
        sys.exit(0)
        EOF

    - name: Create GitHub Issue on Failure
      if: failure()
      uses: actions/github-script@v6
      with:
        script: |
          const now = new Date().toLocaleString('th-TH', { timeZone: 'Asia/Bangkok' });
          const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `Scraper Failed - ${now}`,
            body: [
              '## MOC Scraper Job Failed',
              '',
              `**Time:** ${now} (Bangkok)`,
              `**Run:** ${runUrl}`,
              '',
              '### Immediate Actions',
              '1. Check Firebase - market_data - latest - scraped_at field',
              '2. If stale - trigger manual re-run via workflow_dispatch',
              '3. Check Actions log for root cause',
            ].join('\n'),
            labels: ['bug', 'urgent']
          });
